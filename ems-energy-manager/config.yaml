name: "EMS Energy Manager"
description: "Slim energiebeheersysteem. Ondersteunt SolarEdge (omvormer + inline meter + batterij), Sessy batterij, Easee laadpaal, HomeWizard P1 en Home Assistant entiteiten."
version: "2.0.0"
slug: "ems_energy_manager"
url: "https://github.com/YoranT/ha-ems-addon"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
init: false
startup: application
boot: auto
homeassistant_api: true
hassio_api: true
auth_api: true
ingress: true
ingress_port: 8099
panel_icon: "mdi:lightning-bolt-circle"
panel_title: "EMS"
map:
  - config:rw
options:
  scan_interval: 10
  log_level: "info"
  energy_tariff_import: 0.28
  energy_tariff_export: 0.08
  max_grid_power: 10000
schema:
  scan_interval: int(5,60)
  log_level: list(debug|info|warning|error)
  energy_tariff_import: float
  energy_tariff_export: float
  max_grid_power: int
