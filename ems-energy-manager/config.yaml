name: "EMS Energy Manager"
description: "Slim energiebeheersysteem voor thuisbatterijen, zonnepanelen, laadpalen, warmtepompen en meer."
version: "1.0.0"
slug: "ems_energy_manager"
url: "https://github.com/JOUW_GITHUB_NAAM/ha-ems-addon"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
init: false
startup: application
boot: auto
homeassistant_api: true
hassio_api: true
auth_api: true
ingress: true
ingress_port: 8099
panel_icon: "mdi:lightning-bolt-circle"
panel_title: "EMS"
map:
  - config:rw
options:
  mqtt_host: "homeassistant"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  scan_interval: 10
  log_level: "info"
  energy_tariff_import: 0.28
  energy_tariff_export: 0.08
  max_grid_power: 10000
schema:
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str
  mqtt_password: password
  scan_interval: int(5,60)
  log_level: list(debug|info|warning|error)
  energy_tariff_import: float
  energy_tariff_export: float
  max_grid_power: int
